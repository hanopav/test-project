
<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hodnocení opatření pro krizovou připravenost</title>

  <!-- D3.js -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

  <style>
    :root {
      --bg: #f7f7f7;
      --card: #ffffff;
      --text: #222222;
      --muted: #666666;
      --grid: #dddddd;
      --axis: #333333;
      --border: #dddddd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .dashboard {
      max-width: 1120px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.06);
    }

    .header {
      margin-bottom: 18px;
    }

    .header h2 {
      margin: 0 0 6px 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 22px;
      align-items: start;
    }

    .filters {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      background: #fafafa;
    }

    .filters h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
    }

    .filter-group {
      margin-bottom: 18px;
    }

    .filter-group:last-child {
      margin-bottom: 0;
    }

    .filter-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 650;
      font-size: 13px;
    }

    .checkbox-row {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 8px;
      align-items: start;
      margin-bottom: 9px;
      font-size: 13px;
      line-height: 1.3;
    }

    .range-row {
      display: grid;
      grid-template-columns: 42px 1fr 34px;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    input[type="range"] {
      width: 100%;
    }

    .reset-button {
      width: 100%;
      border: 1px solid var(--border);
      background: white;
      padding: 9px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 650;
    }

    .reset-button:hover {
      background: #f1f1f1;
    }

    .chart-card {
      min-width: 0;
      position: relative;
    }

    #chart {
      width: 100%;
      min-height: 640px;
    }

    .counter {
      margin: 0 0 8px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .axis-label {
      font-size: 13px;
      font-weight: 650;
      fill: var(--axis);
    }

    .axis text {
      font-size: 12px;
      fill: var(--axis);
    }

    .axis path,
    .axis line {
      stroke: var(--axis);
    }

    .grid line {
      stroke: var(--grid);
      stroke-opacity: 0.8;
      shape-rendering: crispEdges;
    }

    .grid path {
      stroke-width: 0;
    }

    .point {
      cursor: pointer;
      transition: opacity 120ms ease;
    }

    .point.is-muted {
      opacity: 0.25;
    }

    .point.is-hovered {
      stroke: #111111;
      stroke-width: 2.5px;
    }

    .tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid #cccccc;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.35;
      box-shadow: 0 8px 24px rgba(0,0,0,0.16);
      max-width: 280px;
      display: none;
      z-index: 10;
    }

    .tooltip strong {
      display: block;
      margin-bottom: 5px;
      font-size: 13.5px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      display: inline-block;
    }

    @media (max-width: 850px) {
      body {
        padding: 12px;
      }

      .dashboard {
        padding: 16px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      #chart {
        min-height: 520px;
      }
    }
  </style>
</head>

<body>
  <div class="dashboard">
    <div class="header">
      <h2>Hodnocení opatření pro krizovou připravenost</h2>
      <p>
        Osa X ukazuje náročnost implementace, osa Y přínosnost opatření na škále 0–5.
        Vyšší poloha v grafu znamená vyšší přínos; poloha více vpravo znamená vyšší implementační náročnost.
      </p>
    </div>

    <div class="layout">
      <aside class="filters">
        <h3>Filtry</h3>

        <div class="filter-group">
          <span class="filter-label">Kategorie</span>
          <div id="categoryFilters"></div>
        </div>

        <div class="filter-group">
          <span class="filter-label">Náročnost implementace</span>

          <div class="range-row">
            <span>Max.</span>
            <input id="maxNarocnost" type="range" min="0" max="5" step="0.1" value="5" />
            <strong id="maxNarocnostValue">5.0</strong>
          </div>
        </div>

        <div class="filter-group">
          <span class="filter-label">Přínosnost</span>

          <div class="range-row">
            <span>Max.</span>
            <input id="maxPrinosnost" type="range" min="0" max="5" step="0.1" value="5" />
            <strong id="maxPrinosnostValue">5.0</strong>
          </div>
        </div>

        <button class="reset-button" id="resetFilters">Resetovat filtry</button>
      </aside>

      <main class="chart-card">
        <p class="counter" id="counter"></p>
        <div id="chart"></div>
        <div class="legend" id="legend"></div>
        <div class="tooltip" id="tooltip"></div>
      </main>
    </div>
  </div>

  <script>
    // ------------------------------------------------------------------
    // 1) DATA
    // ------------------------------------------------------------------
    // Data jsou vložená přímo v kódu, aby graf šel snadno embedovat.
    // Při změně dat stačí upravit tento blok nebo ho nahradit exportem z Excelu/CSV.

    const data = [
      {
        kategorie: "Vzdělávání a kompetence společnosti",
        opatreni: "MŠ: návyk, rozhodování, chování",
        narocnost: 2.5,
        prinosnost: 1.8
      },
      {
        kategorie: "Vzdělávání a kompetence společnosti",
        opatreni: "ZŠ: praktické dovednosti",
        narocnost: 3.0,
        prinosnost: 3.2
      },
      {
        kategorie: "Vzdělávání a kompetence společnosti",
        opatreni: "SŠ: povinný předmět k resilienci",
        narocnost: 4.5,
        prinosnost: 3.7
      },
      {
        kategorie: "Vzdělávání a kompetence společnosti",
        opatreni: "VŠ: kredity za DVC / AZ",
        narocnost: 3.0,
        prinosnost: 2.6
      },
      {
        kategorie: "Připravenost dospělé populace",
        opatreni: "Oficiální jednotný online modul",
        narocnost: 3.0,
        prinosnost: 3.8
      },
      {
        kategorie: "Připravenost dospělé populace",
        opatreni: "Pravidelná povinná příprava zaměstnanců",
        narocnost: 4.0,
        prinosnost: 4.6
      },
      {
        kategorie: "Připravenost dospělé populace",
        opatreni: "Cvičení výpadku služeb",
        narocnost: 4.0,
        prinosnost: 3.5
      },
      {
        kategorie: "Připravenost dospělé populace",
        opatreni: "Schopnosti oproti příslibu využití v krizi",
        narocnost: 4.0,
        prinosnost: 3.8
      },
      {
        kategorie: "Připravenost dospělé populace",
        opatreni: "Instrukce při zkoušce sirén",
        narocnost: 1.5,
        prinosnost: 2.2
      },
      {
        kategorie: "Lokální komunity a leadership",
        opatreni: "Uvolnění pro komunitní práci",
        narocnost: 4.5,
        prinosnost: 3.7
      },
      {
        kategorie: "Lokální komunity a leadership",
        opatreni: "Zapojení lokálních specifických skupin",
        narocnost: 3.5,
        prinosnost: 4.2
      },
      {
        kategorie: "Lokální komunity a leadership",
        opatreni: "Zapojení starostů",
        narocnost: 3.0,
        prinosnost: 4.2,
        url: "https://www.ceskepriority.cz/testovaci-stranka#komunity"
      }
    ];

    // ------------------------------------------------------------------
    // 2) ZÁKLADNÍ NASTAVENÍ
    // ------------------------------------------------------------------

    const categories = Array.from(new Set(data.map(d => d.kategorie)));

    const color = d3.scaleOrdinal()
      .domain(categories)
      .range(["#003C71", "#EF3340", "#2E7D32"]);

    const state = {
      selectedCategories: new Set(categories),
      maxNarocnost: 5,
      maxPrinosnost: 5
    };

    const chartEl = document.getElementById("chart");
    const tooltip = d3.select("#tooltip");
    const counter = d3.select("#counter");

    // ------------------------------------------------------------------
    // 3) FILTRY
    // ------------------------------------------------------------------

    const categoryFilters = d3.select("#categoryFilters");

    categoryFilters
      .selectAll("label")
      .data(categories)
      .join("label")
      .attr("class", "checkbox-row")
      .html(d => `
        <input type="checkbox" value="${d}" checked />
        <span>${d}</span>
      `);

    categoryFilters.selectAll("input").on("change", function(event) {
      const value = this.value;

      if (this.checked) {
        state.selectedCategories.add(value);
      } else {
        state.selectedCategories.delete(value);
      }

      draw();
    });

    function bindRange(id, key) {
      const input = document.getElementById(id);

      input.addEventListener("input", () => {
        state[key] = Number(input.value);
        syncInputs();
        draw();
      });
    }

    bindRange("maxNarocnost", "maxNarocnost");
    bindRange("maxPrinosnost", "maxPrinosnost");

    document.getElementById("resetFilters").addEventListener("click", () => {
      state.selectedCategories = new Set(categories);
      state.maxNarocnost = 5;
      state.maxPrinosnost = 5;

      categoryFilters.selectAll("input").property("checked", true);
      syncInputs();
      draw();
    });

    function syncInputs() {
      const mappings = [
        ["maxNarocnost", state.maxNarocnost],
        ["maxPrinosnost", state.maxPrinosnost]
      ];

      mappings.forEach(([id, value]) => {
        document.getElementById(id).value = value;
        document.getElementById(`${id}Value`).textContent = value.toFixed(1);
      });
    }

    syncInputs();

    // ------------------------------------------------------------------
    // 4) POMOCNÉ FUNKCE
    // ------------------------------------------------------------------

    function getFilteredData() {
      return data.filter(d =>
        state.selectedCategories.has(d.kategorie) &&
        d.narocnost <= state.maxNarocnost &&
        d.prinosnost <= state.maxPrinosnost
      );
    }

    // Pokud mají některé body stejné hodnoty, mírně je opticky odsadíme,
    // aby nebyl jeden úplně schovaný pod druhým.
    function addOffsets(rows) {
      const grouped = d3.group(rows, d => `${d.narocnost}|${d.prinosnost}`);

      grouped.forEach(group => {
        const n = group.length;

        group.forEach((d, i) => {
          if (n === 1) {
            d.offsetX = 0;
            d.offsetY = 0;
          } else {
            const angle = (2 * Math.PI * i) / n;
            const radius = 8;
            d.offsetX = Math.cos(angle) * radius;
            d.offsetY = Math.sin(angle) * radius;
          }
        });
      });

      return rows;
    }

    function formatNumber(value) {
      return Number(value).toLocaleString("cs-CZ", {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1
      });
    }

    // ------------------------------------------------------------------
    // 5) VYKRESLENÍ GRAFU
    // ------------------------------------------------------------------

    function draw() {
      const filtered = addOffsets(getFilteredData().map(d => ({ ...d })));

      counter.text(`Zobrazeno opatření: ${filtered.length} z ${data.length}`);

      chartEl.innerHTML = "";

      const width = chartEl.clientWidth || 780;
      const height = Math.max(560, Math.min(700, width * 0.72));

      const margin = {
        top: 28,
        right: 28,
        bottom: 72,
        left: 76
      };

      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;

      const svg = d3.select(chartEl)
        .append("svg")
        .attr("width", width)
        .attr("height", height)
        .attr("viewBox", [0, 0, width, height])
        .attr("role", "img")
        .attr("aria-label", "Scatterplot hodnocení opatření podle náročnosti implementace a přínosnosti.");

      const g = svg.append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

      const x = d3.scaleLinear()
        .domain([0, 5])
        .range([0, innerWidth]);

      const y = d3.scaleLinear()
        .domain([0, 5])
        .range([innerHeight, 0]);

      const tickValues = [0, 1, 2, 3, 4, 5];

      // Grid
      g.append("g")
        .attr("class", "grid")
        .attr("transform", `translate(0,${innerHeight})`)
        .call(
          d3.axisBottom(x)
            .tickValues(tickValues)
            .tickSize(-innerHeight)
            .tickFormat("")
        );

      g.append("g")
        .attr("class", "grid")
        .call(
          d3.axisLeft(y)
            .tickValues(tickValues)
            .tickSize(-innerWidth)
            .tickFormat("")
        );

      // Osy
      g.append("g")
        .attr("class", "axis")
        .attr("transform", `translate(0,${innerHeight})`)
        .call(d3.axisBottom(x).tickValues(tickValues));

      g.append("g")
        .attr("class", "axis")
        .call(d3.axisLeft(y).tickValues(tickValues));

      // Popisky os
      svg.append("text")
        .attr("class", "axis-label")
        .attr("x", margin.left + innerWidth / 2)
        .attr("y", height - 24)
        .attr("text-anchor", "middle")
        .text("Náročnost implementace");

      svg.append("text")
        .attr("class", "axis-label")
        .attr("transform", "rotate(-90)")
        .attr("x", -(margin.top + innerHeight / 2))
        .attr("y", 24)
        .attr("text-anchor", "middle")
        .text("Přínosnost");

      // Kvadrantové vodicí linie na hodnotě 3
      g.append("line")
        .attr("x1", x(2.5))
        .attr("x2", x(2.5))
        .attr("y1", 0)
        .attr("y2", innerHeight)
        .attr("stroke", "#999999")
        .attr("stroke-dasharray", "5 5")
        .attr("opacity", 0.55);

      g.append("line")
        .attr("x1", 0)
        .attr("x2", innerWidth)
        .attr("y1", y(2.5))
        .attr("y2", y(2.5))
        .attr("stroke", "#999999")
        .attr("stroke-dasharray", "5 5")
        .attr("opacity", 0.55);

      // Body
      const points = g.selectAll(".point")
        .data(filtered, d => d.opatreni)
        .join("circle")
        .attr("class", "point")
        .attr("cx", d => x(d.narocnost) + d.offsetX)
        .attr("cy", d => y(d.prinosnost) + d.offsetY)
        .attr("r", 8.5)
        .attr("fill", d => color(d.kategorie))
        .attr("stroke", "#ffffff")
        .attr("stroke-width", 1.8)
        .attr("opacity", 0.92)

        .on("click", function(event, d) {
          if (!d.url) return;
            window.top.location.href = d.url;
        })
          
        .on("mouseenter", function(event, d) {
          points.classed("is-muted", p => p.opatreni !== d.opatreni);

          d3.select(this)
            .classed("is-hovered", true)
            .raise()
            .transition()
            .duration(120)
            .attr("r", 13);

          tooltip
            .style("display", "block")
            .html(`
              <strong>${d.opatreni}</strong>
              <div>Kategorie: ${d.kategorie}</div>
              <div>Náročnost: ${formatNumber(d.narocnost)}</div>
              <div>Přínosnost: ${formatNumber(d.prinosnost)}</div>
            `);
        })
        .on("mousemove", function(event) {
          const containerRect = document.querySelector(".chart-card").getBoundingClientRect();

          tooltip
            .style("left", `${event.clientX - containerRect.left + 14}px`)
            .style("top", `${event.clientY - containerRect.top + 14}px`);
        })
        .on("mouseleave", function() {
          points.classed("is-muted", false);

          d3.select(this)
            .classed("is-hovered", false)
            .transition()
            .duration(120)
            .attr("r", 8.5);

          tooltip.style("display", "none");
        });
    }

    // ------------------------------------------------------------------
    // 6) LEGENDA A RESPONSIVITA
    // ------------------------------------------------------------------

    d3.select("#legend")
      .selectAll(".legend-item")
      .data(categories)
      .join("div")
      .attr("class", "legend-item")
      .html(d => `
        <span class="legend-swatch" style="background:${color(d)}"></span>
        <span>${d}</span>
      `);

    draw();

    const resizeObserver = new ResizeObserver(() => draw());
    resizeObserver.observe(chartEl);
  </script>
</body>
</html>
